version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: school-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: school_management
      MYSQL_USER: schooluser
      MYSQL_PASSWORD: schoolpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://schooluser:schoolpass@mysql:3306/school_management?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./prisma:/app/prisma

volumes:
  mysql_data:

